description: "LaTeX book (6.5×9.25in) — navy serif body, callout cards, chapter openers, dotted-leader TOC. Best for handbooks, guides, and long reports."
backend: pandoc-tectonic
pandoc_args:
  - --top-level-division=chapter
  - --number-sections
  - -V
  - documentclass=book
  - -V
  - classoption=11pt
  - -V
  - classoption=twoside
  - -V
  - classoption=openright
  # Every hyperlink — TOC entries, internal cross-refs, external URLs, and
  # citations — renders in one uniform link blue (linkblue, #1565C0, defined in
  # design-system.yaml and emitted into the generated _tokens.tex before this).
  # colorlinks keeps them text-coloured (no boxes) while staying clickable.
  - -V
  - colorlinks=true
  - -V
  - linkcolor=linkblue
  - -V
  - toccolor=linkblue
  - -V
  - urlcolor=linkblue
  - -V
  - citecolor=linkblue
header_includes:   # rendered after the generated _tokens.tex
  - preamble.tex
  - titlepage.tex
lua_filters:
  - callouts.lua
