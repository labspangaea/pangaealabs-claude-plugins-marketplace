<!--
  concept-deck · ISOMETRIC OBJECT LIBRARY (reference sheet — copy a <g> into a cover/scene).
  Every solid is built from the cuboid grammar in iso-cover.svg / icons.md §B:
  3 flat-shaded faces (top lightest · left ~15% darker · right ~30% darker), 4px black
  outline, optional signal #3FA9F5 accent. Anchored at the top-rhombus centre (0,0).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Poppins, sans-serif">
  <rect width="1920" height="1080" fill="#F4F6FD"/>
  <text x="96" y="100" font-size="56" font-weight="900" fill="#0A0A0A">Isometric object library</text>
  <text x="98" y="150" font-family="JetBrains Mono, monospace" font-size="26" fill="#1A6AAE">// flat-shaded · 3-tint faces · 4px black outline · signal accents</text>

  <!-- CUBOID (generic node) — mint, H=160 -->
  <g transform="translate(300,440) scale(0.62)" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round">
    <polygon points="-156,0 0,90 0,250 -156,160" fill="#7FD9B6"/>
    <polygon points="0,90 156,0 156,160 0,250" fill="#5BBF98"/>
    <polygon points="0,-90 156,0 0,90 -156,0" fill="#A9F5D9"/>
  </g>
  <text x="300" y="640" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">cuboid</text>

  <!-- SERVER / INDEX — blue, H=260, signal cells + slots -->
  <g transform="translate(640,380) scale(0.62)" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round">
    <polygon points="-156,0 0,90 0,350 -156,260" fill="#95BAEE"/>
    <polygon points="0,90 156,0 156,260 0,350" fill="#6F97D4"/>
    <polygon points="0,-90 156,0 0,90 -156,0" fill="#BCD8FF"/>
    <g fill="#3FA9F5" stroke="none">
      <circle cx="54.6" cy="133.5" r="11"/><circle cx="101.4" cy="106.5" r="11"/>
      <circle cx="54.6" cy="206" r="11"/><circle cx="101.4" cy="179" r="11"/>
      <circle cx="54.6" cy="278.5" r="11"/><circle cx="101.4" cy="251.5" r="11"/>
    </g>
    <g stroke="#0A0A0A" stroke-width="3" stroke-linecap="round">
      <line x1="-132.6" y1="88.5" x2="-23.4" y2="151.5"/>
      <line x1="-132.6" y1="148.5" x2="-23.4" y2="211.5"/>
      <line x1="-132.6" y1="208.5" x2="-23.4" y2="271.5"/>
    </g>
  </g>
  <text x="640" y="640" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">server / index</text>

  <!-- DOC-STACK — peach, H=60, sheets + content lines -->
  <g transform="translate(1010,470) scale(0.62)" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round">
    <polygon points="0,-122 156,-32 0,58 -156,-32" fill="#FFEFD8"/>
    <polygon points="0,-106 156,-16 0,74 -156,-16" fill="#FFE6C6"/>
    <polygon points="-156,0 0,90 0,150 -156,60" fill="#EFC089"/>
    <polygon points="0,90 156,0 156,60 0,150" fill="#E0A45F"/>
    <polygon points="0,-90 156,0 0,90 -156,0" fill="#FFDEB6"/>
    <g stroke="#1A6AAE" stroke-width="6" stroke-linecap="round">
      <line x1="-70" y1="-8" x2="6" y2="36"/><line x1="-46" y1="-22" x2="30" y2="22"/><line x1="-22" y1="-36" x2="40" y2="0"/>
    </g>
  </g>
  <text x="1010" y="640" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">doc-stack</text>

  <!-- LLM-BLOCK — lilac, H=170, neural cluster -->
  <g transform="translate(360,820) scale(0.62)" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round">
    <polygon points="-156,0 0,90 0,260 -156,170" fill="#BCA8E9"/>
    <polygon points="0,90 156,0 156,170 0,260" fill="#9E83D6"/>
    <polygon points="0,-90 156,0 0,90 -156,0" fill="#D8C8F5"/>
    <g stroke="#0A0A0A" stroke-width="3">
      <line x1="70.2" y1="109" x2="78" y2="138.5"/><line x1="109.2" y1="103.5" x2="78" y2="138.5"/>
      <line x1="78" y1="138.5" x2="62.4" y2="173"/><line x1="78" y1="138.5" x2="106" y2="151.2"/>
    </g>
    <g fill="#3FA9F5" stroke="#0A0A0A" stroke-width="2.5">
      <circle cx="70.2" cy="109" r="9"/><circle cx="109.2" cy="103.5" r="9"/>
      <circle cx="78" cy="138.5" r="10"/><circle cx="62.4" cy="173" r="9"/><circle cx="106" cy="151.2" r="9"/>
    </g>
  </g>
  <text x="360" y="1010" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">llm-block</text>

  <!-- DB-CYLINDER — blue upright cylinder, signal rim -->
  <g transform="translate(720,720) scale(0.62)" stroke="#0A0A0A" stroke-width="4" stroke-linejoin="round">
    <path d="M-130,0 V200 A130,66 0 0 0 130,200 V0" fill="#95BAEE"/>
    <path d="M-130,100 A130,66 0 0 0 130,100" fill="none" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="130" ry="66" fill="#BCD8FF"/>
    <ellipse cx="0" cy="0" rx="92" ry="46" fill="none" stroke="#3FA9F5" stroke-width="4"/>
  </g>
  <text x="720" y="1010" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">db-cylinder</text>

  <!-- FLAT DATA PANEL (vector space) — a flat companion to the iso solids -->
  <g transform="translate(1080,700) scale(0.58)" stroke-linejoin="round">
    <rect x="0" y="0" width="660" height="500" rx="24" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <rect x="200" y="-24" width="280" height="48" fill="#F4F6FD"/>
    <text x="340" y="11" text-anchor="middle" font-size="38" font-weight="900" fill="#0A0A0A">data panel</text>
    <g fill="#AEB6C7"><circle cx="120" cy="150" r="11"/><circle cx="300" cy="120" r="11"/><circle cx="500" cy="170" r="11"/><circle cx="200" cy="320" r="11"/><circle cx="540" cy="350" r="11"/><circle cx="410" cy="410" r="11"/></g>
    <g fill="#3FA9F5" stroke="#0A0A0A" stroke-width="2.5"><circle cx="300" cy="260" r="13"/><circle cx="380" cy="300" r="13"/></g>
    <circle cx="330" cy="240" r="17" fill="#1A6AAE" stroke="#0A0A0A" stroke-width="3"/>
  </g>
  <text x="1410" y="1010" text-anchor="middle" font-size="34" font-weight="800" fill="#0A0A0A">data panel (flat)</text>
</svg>
