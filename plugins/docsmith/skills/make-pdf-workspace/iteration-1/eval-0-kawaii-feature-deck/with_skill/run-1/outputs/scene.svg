<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <!-- Soft storybook backdrop: pastel sky, rolling hills, clouds, floating mail -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDEAF6"/>
      <stop offset="55%" stop-color="#E7E1F1"/>
      <stop offset="100%" stop-color="#F8E0E4"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCEFE0"/>
      <stop offset="100%" stop-color="#C7E4CE"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE8DA"/>
      <stop offset="100%" stop-color="#F4D6BE"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1920" height="1080" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="1620" cy="230" r="120" fill="#FBEF9E" opacity="0.8"/>
  <circle cx="1620" cy="230" r="150" fill="#FBEF9E" opacity="0.3"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="360" cy="220" rx="120" ry="48"/>
    <ellipse cx="270" cy="240" rx="80" ry="40"/>
    <ellipse cx="450" cy="245" rx="80" ry="38"/>
  </g>
  <g fill="#FFFFFF" opacity="0.8">
    <ellipse cx="1080" cy="150" rx="100" ry="40"/>
    <ellipse cx="1010" cy="170" rx="66" ry="33"/>
    <ellipse cx="1150" cy="170" rx="66" ry="33"/>
  </g>

  <!-- rolling hills -->
  <path d="M0 820 Q480 690 960 800 Q1440 910 1920 760 L1920 1080 L0 1080 Z" fill="url(#hill2)"/>
  <path d="M0 900 Q520 800 1040 890 Q1500 970 1920 870 L1920 1080 L0 1080 Z" fill="url(#hill1)"/>

  <!-- tiny path -->
  <path d="M820 1080 Q900 980 980 940 Q1060 900 1080 860" fill="none" stroke="#EAD9BB" stroke-width="22" stroke-linecap="round" opacity="0.8"/>

  <!-- floating envelopes with motion paths -->
  <g stroke="#C8623F" stroke-width="5" fill="#FFFFFF">
    <g transform="translate(540 470) rotate(-12)">
      <rect x="0" y="0" width="120" height="82" rx="8"/>
      <path d="M0 6 L60 48 L120 6" fill="none"/>
    </g>
    <g transform="translate(1280 520) rotate(10)">
      <rect x="0" y="0" width="120" height="82" rx="8"/>
      <path d="M0 6 L60 48 L120 6" fill="none"/>
    </g>
  </g>
  <path d="M620 540 Q820 600 1280 560" fill="none" stroke="#C8623F" stroke-width="4" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.6"/>

  <!-- sparkles -->
  <g fill="#F3D98A">
    <path d="M200 540 l8 18 l18 8 l-18 8 l-8 18 l-8 -18 l-18 -8 l18 -8 z"/>
    <path d="M1700 560 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 l14 -6 z"/>
  </g>
  <circle cx="980" cy="430" r="9" fill="#C9B3E8"/>
  <circle cx="700" cy="360" r="7" fill="#A9C8E8"/>
</svg>
