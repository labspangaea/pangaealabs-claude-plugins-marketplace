<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <!-- Soft storybook backdrop: rolling pastel hills, drifting mail + hearts + paw prints -->
  <defs>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DDEAF6"/>
      <stop offset="1" stop-color="#F8E0E4"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCEFE0"/>
      <stop offset="1" stop-color="#CFE8DE"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7E1F1"/>
      <stop offset="1" stop-color="#DEE6F4"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="900" height="420" rx="28" fill="url(#skyG)"/>

  <!-- sun -->
  <circle cx="760" cy="92" r="48" fill="#F6E7B8" opacity="0.9"/>
  <circle cx="760" cy="92" r="48" fill="none" stroke="#F3D98A" stroke-width="6" opacity="0.6"/>

  <!-- fluffy clouds -->
  <g fill="#FFFFFF" opacity="0.92">
    <ellipse cx="150" cy="80" rx="52" ry="28"/>
    <ellipse cx="195" cy="80" rx="40" ry="24"/>
    <ellipse cx="110" cy="88" rx="34" ry="20"/>
  </g>
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="470" cy="55" rx="44" ry="22"/>
    <ellipse cx="505" cy="55" rx="32" ry="18"/>
  </g>

  <!-- back hill -->
  <path d="M0 300 C200 230 360 320 520 270 C680 220 820 300 900 260 L900 420 L0 420 Z" fill="url(#hill2)"/>
  <!-- front hill -->
  <path d="M0 350 C160 300 320 380 480 340 C640 300 780 370 900 330 L900 420 L0 420 Z" fill="url(#hill1)"/>

  <!-- floating envelope 1 -->
  <g transform="translate(250 150) rotate(-8)">
    <rect x="0" y="0" width="96" height="64" rx="10" fill="#FFFFFF" stroke="#E2DBC9" stroke-width="3"/>
    <path d="M0 8 L48 40 L96 8" fill="none" stroke="#C8623F" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <!-- floating envelope 2 -->
  <g transform="translate(600 195) rotate(7)">
    <rect x="0" y="0" width="84" height="56" rx="9" fill="#FBF6E3" stroke="#E2DBC9" stroke-width="3"/>
    <path d="M0 7 L42 35 L84 7" fill="none" stroke="#5A3A8A" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- drifting hearts -->
  <path d="M430 130 C424 122 412 124 412 134 C412 142 430 152 430 152 C430 152 448 142 448 134 C448 124 436 122 430 130 Z" fill="#E8604A" opacity="0.85"/>
  <path d="M360 210 C356 205 348 206 348 213 C348 218 360 225 360 225 C360 225 372 218 372 213 C372 206 364 205 360 210 Z" fill="#F6D9DE" stroke="#9E4C5C" stroke-width="2"/>

  <!-- paw prints on the hill -->
  <g fill="#7FCB86" opacity="0.85">
    <g transform="translate(150 360)">
      <ellipse cx="0" cy="6" rx="11" ry="9"/>
      <circle cx="-9" cy="-7" r="4"/><circle cx="-1" cy="-11" r="4"/>
      <circle cx="7" cy="-11" r="4"/><circle cx="13" cy="-5" r="4"/>
    </g>
    <g transform="translate(215 388) rotate(12)">
      <ellipse cx="0" cy="6" rx="11" ry="9"/>
      <circle cx="-9" cy="-7" r="4"/><circle cx="-1" cy="-11" r="4"/>
      <circle cx="7" cy="-11" r="4"/><circle cx="13" cy="-5" r="4"/>
    </g>
  </g>

  <!-- a tiny tree -->
  <rect x="800" y="300" width="14" height="50" rx="6" fill="#C8623F"/>
  <circle cx="807" cy="296" r="38" fill="#7FCB86"/>
  <circle cx="788" cy="306" r="24" fill="#6BBE73"/>
  <circle cx="826" cy="306" r="24" fill="#6BBE73"/>
</svg>
