<svg xmlns="http://www.w3.org/2000/svg" width="460" height="500" viewBox="0 0 460 500">
  <!-- Posty the Pawmail pup: a kawaii puppy hugging a letter envelope -->
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBE8DA"/>
      <stop offset="1" stop-color="#F6E3CF"/>
    </linearGradient>
    <linearGradient id="envG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBF6E3"/>
    </linearGradient>
  </defs>

  <!-- soft ground shadow -->
  <ellipse cx="230" cy="470" rx="150" ry="20" fill="#E2DBC9" opacity="0.55"/>

  <!-- ===== ears (behind head) ===== -->
  <path d="M120 150 C70 120 60 220 110 250 C140 240 150 190 145 165 Z" fill="#C8623F"/>
  <path d="M340 150 C390 120 400 220 350 250 C320 240 310 190 315 165 Z" fill="#C8623F"/>
  <path d="M122 160 C92 145 86 215 116 238 C134 230 140 192 138 172 Z" fill="#E07A52"/>
  <path d="M338 160 C368 145 374 215 344 238 C326 230 320 192 322 172 Z" fill="#E07A52"/>

  <!-- ===== head ===== -->
  <ellipse cx="230" cy="200" rx="135" ry="120" fill="url(#bodyG)" stroke="#E2DBC9" stroke-width="3"/>

  <!-- cheek blushes -->
  <ellipse cx="135" cy="225" rx="26" ry="16" fill="#F6D9DE" opacity="0.85"/>
  <ellipse cx="325" cy="225" rx="26" ry="16" fill="#F6D9DE" opacity="0.85"/>

  <!-- eyes -->
  <circle cx="180" cy="185" r="22" fill="#3D3A37"/>
  <circle cx="280" cy="185" r="22" fill="#3D3A37"/>
  <circle cx="188" cy="178" r="7" fill="#FFFFFF"/>
  <circle cx="288" cy="178" r="7" fill="#FFFFFF"/>

  <!-- muzzle + nose -->
  <ellipse cx="230" cy="240" rx="48" ry="36" fill="#FFFFFF" opacity="0.7"/>
  <ellipse cx="230" cy="222" rx="18" ry="13" fill="#3D3A37"/>
  <path d="M230 235 L230 252" stroke="#3D3A37" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M230 252 C214 268 198 262 196 248" stroke="#3D3A37" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M230 252 C246 268 262 262 264 248" stroke="#3D3A37" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ===== body ===== -->
  <ellipse cx="230" cy="390" rx="115" ry="90" fill="url(#bodyG)" stroke="#E2DBC9" stroke-width="3"/>

  <!-- ===== envelope being hugged ===== -->
  <rect x="150" y="345" width="160" height="110" rx="14" fill="url(#envG)" stroke="#E2DBC9" stroke-width="3"/>
  <path d="M150 359 L230 410 L310 359" fill="none" stroke="#C8623F" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- little heart seal -->
  <path d="M230 396 C224 388 212 390 212 400 C212 408 230 418 230 418 C230 418 248 408 248 400 C248 390 236 388 230 396 Z" fill="#E8604A"/>

  <!-- ===== front paws hugging the envelope ===== -->
  <ellipse cx="142" cy="430" rx="34" ry="26" fill="url(#bodyG)" stroke="#E2DBC9" stroke-width="3"/>
  <ellipse cx="318" cy="430" rx="34" ry="26" fill="url(#bodyG)" stroke="#E2DBC9" stroke-width="3"/>
  <ellipse cx="142" cy="432" rx="11" ry="9" fill="#F6D9DE"/>
  <ellipse cx="318" cy="432" rx="11" ry="9" fill="#F6D9DE"/>

  <!-- wagging tail -->
  <path d="M338 360 C400 330 420 380 392 405 C372 392 350 380 338 372 Z" fill="url(#bodyG)" stroke="#E2DBC9" stroke-width="3"/>
</svg>
