<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#003060"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E0821A"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="760" height="420" fill="#ffffff"/>

  <!-- title -->
  <text x="380" y="30" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#003060" text-anchor="middle">How a RAG App Talks to the Vector Store</text>

  <!-- User -->
  <rect x="30" y="170" width="120" height="60" rx="8" fill="#ffffff" stroke="#003060" stroke-width="2"/>
  <text x="90" y="198" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#003060" text-anchor="middle">User</text>
  <text x="90" y="216" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">asks a question</text>

  <!-- RAG App -->
  <rect x="230" y="150" width="160" height="100" rx="8" fill="#ffffff" stroke="#003060" stroke-width="2"/>
  <text x="310" y="180" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#003060" text-anchor="middle">RAG Application</text>
  <text x="310" y="202" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">1. embed query</text>
  <text x="310" y="220" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">2. retrieve top-k</text>
  <text x="310" y="238" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">3. build prompt</text>

  <!-- Embedding model -->
  <rect x="260" y="40" width="200" height="56" rx="8" fill="#ffffff" stroke="#1A7A3A" stroke-width="2"/>
  <text x="360" y="64" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A7A3A" text-anchor="middle">Embedding Model</text>
  <text x="360" y="82" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#1A7A3A" text-anchor="middle">text → vector</text>

  <!-- Vector store -->
  <rect x="500" y="150" width="220" height="100" rx="8" fill="#ffffff" stroke="#E0821A" stroke-width="2.5"/>
  <text x="610" y="178" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#E0821A" text-anchor="middle">Vector Store</text>
  <text x="610" y="200" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#003060" text-anchor="middle">pgvector / Pinecone / Qdrant</text>
  <text x="610" y="220" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">ANN index over</text>
  <text x="610" y="237" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">document embeddings</text>

  <!-- LLM -->
  <rect x="500" y="310" width="220" height="64" rx="8" fill="#ffffff" stroke="#5A3A8A" stroke-width="2"/>
  <text x="610" y="338" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#5A3A8A" text-anchor="middle">LLM</text>
  <text x="610" y="358" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5A3A8A" text-anchor="middle">grounded answer from context</text>

  <!-- User -> RAG -->
  <line x1="150" y1="200" x2="226" y2="200" stroke="#003060" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="188" y="192" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#003060" text-anchor="middle">query</text>

  <!-- RAG -> embedding -->
  <line x1="320" y1="150" x2="345" y2="98" stroke="#1A7A3A" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- embedding -> RAG (return vector) -->
  <line x1="390" y1="96" x2="370" y2="148" stroke="#1A7A3A" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="430" y="125" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#1A7A3A" text-anchor="middle">vector</text>

  <!-- RAG -> Vector store (similarity search) -->
  <line x1="390" y1="185" x2="496" y2="185" stroke="#E0821A" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <text x="443" y="177" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#E0821A" text-anchor="middle">similarity search</text>

  <!-- Vector store -> RAG (top-k chunks) -->
  <line x1="496" y1="215" x2="392" y2="215" stroke="#E0821A" stroke-width="2.5" stroke-dasharray="4 3" marker-end="url(#arrowAmber)"/>
  <text x="443" y="232" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#E0821A" text-anchor="middle">top-k chunks</text>

  <!-- RAG -> LLM (prompt + context) -->
  <line x1="350" y1="250" x2="540" y2="312" stroke="#5A3A8A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="295" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5A3A8A" text-anchor="middle">prompt + context</text>

  <!-- LLM -> User (answer) -->
  <path d="M500,355 C300,395 150,330 92,232" fill="none" stroke="#5A3A8A" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="250" y="378" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5A3A8A" text-anchor="middle">grounded answer</text>

  <!-- offline ingestion note -->
  <rect x="500" y="100" width="220" height="34" rx="6" fill="#f4f1f8" stroke="#5A3A8A" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="610" y="121" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5A3A8A" text-anchor="middle">offline: docs chunked + embedded → upserted</text>
  <line x1="610" y1="134" x2="610" y2="148" stroke="#5A3A8A" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
</svg>
