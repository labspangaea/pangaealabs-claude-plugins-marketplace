<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" font-family="sans-serif">
  <defs>
    <marker id="arrowNavy" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#1b3a5b"/>
    </marker>
  </defs>

  <!-- Step 1: Fetch diff -->
  <rect x="20" y="55" width="160" height="70" rx="10" fill="#e8eef5" stroke="#1b3a5b" stroke-width="2"/>
  <text x="100" y="88" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b3a5b">Fetch diff</text>
  <text x="100" y="110" text-anchor="middle" font-size="12" fill="#5a6b7d">pull the change</text>

  <!-- arrow 1 -->
  <line x1="180" y1="90" x2="232" y2="90" stroke="#1b3a5b" stroke-width="2.5" marker-end="url(#arrowNavy)"/>

  <!-- Step 2: Apply rules (accent) -->
  <rect x="240" y="55" width="160" height="70" rx="10" fill="#d68a2e" stroke="#1b3a5b" stroke-width="2"/>
  <text x="320" y="88" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Apply rules</text>
  <text x="320" y="110" text-anchor="middle" font-size="12" fill="#3a2a10">check each line</text>

  <!-- arrow 2 -->
  <line x1="400" y1="90" x2="452" y2="90" stroke="#1b3a5b" stroke-width="2.5" marker-end="url(#arrowNavy)"/>

  <!-- Step 3: Post comments -->
  <rect x="460" y="55" width="160" height="70" rx="10" fill="#e8eef5" stroke="#1b3a5b" stroke-width="2"/>
  <text x="540" y="88" text-anchor="middle" font-size="18" font-weight="bold" fill="#1b3a5b">Post comments</text>
  <text x="540" y="110" text-anchor="middle" font-size="12" fill="#5a6b7d">share findings</text>

  <!-- caption hint -->
  <text x="320" y="152" text-anchor="middle" font-size="13" font-style="italic" fill="#8a8a8a">fetch the diff, apply the rules, then post what you found</text>
</svg>
