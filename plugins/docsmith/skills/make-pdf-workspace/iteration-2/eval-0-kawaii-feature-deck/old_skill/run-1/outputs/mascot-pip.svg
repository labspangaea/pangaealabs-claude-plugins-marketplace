<svg xmlns="http://www.w3.org/2000/svg" width="560" height="620" viewBox="0 0 560 620">
  <!-- Pip the Pup — Pawmail mascot, hand-written kawaii SVG -->
  <defs>
    <linearGradient id="bgPip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBE8DA"/>
      <stop offset="1" stop-color="#F8E0E4"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F6B8C0"/>
      <stop offset="1" stop-color="#F6B8C0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft rounded backdrop -->
  <rect x="10" y="10" width="540" height="600" rx="48" fill="url(#bgPip)" stroke="#ECE7DC" stroke-width="3"/>

  <!-- little floating hearts / sparkles -->
  <path d="M70 110 q-14 -18 -28 0 q-14 -18 -28 0 q0 22 28 40 q28 -18 28 -40 z" transform="translate(20 -20) scale(0.5)" fill="#F6B8C0"/>
  <circle cx="500" cy="90" r="7" fill="#FBEF9E"/>
  <circle cx="470" cy="140" r="5" fill="#CFE4F2"/>
  <path d="M485 470 l6 14 l15 2 l-11 11 l3 15 l-13 -8 l-13 8 l3 -15 l-11 -11 l15 -2 z" fill="#FBEF9E"/>

  <!-- ears (floppy) -->
  <ellipse cx="168" cy="210" rx="58" ry="96" fill="#C89A6E" stroke="#A87A4E" stroke-width="4" transform="rotate(-18 168 210)"/>
  <ellipse cx="392" cy="210" rx="58" ry="96" fill="#C89A6E" stroke="#A87A4E" stroke-width="4" transform="rotate(18 392 210)"/>

  <!-- head -->
  <ellipse cx="280" cy="248" rx="150" ry="138" fill="#F3D9B8" stroke="#D9B98E" stroke-width="4"/>

  <!-- patch over one eye -->
  <ellipse cx="218" cy="232" rx="56" ry="58" fill="#C89A6E" opacity="0.6"/>

  <!-- cheeks -->
  <circle cx="178" cy="288" r="34" fill="url(#cheek)"/>
  <circle cx="382" cy="288" r="34" fill="url(#cheek)"/>

  <!-- eyes (big kawaii) -->
  <circle cx="218" cy="240" r="30" fill="#3D3A37"/>
  <circle cx="227" cy="231" r="10" fill="#FFFFFF"/>
  <circle cx="210" cy="249" r="5" fill="#FFFFFF"/>
  <circle cx="342" cy="240" r="30" fill="#3D3A37"/>
  <circle cx="351" cy="231" r="10" fill="#FFFFFF"/>
  <circle cx="334" cy="249" r="5" fill="#FFFFFF"/>

  <!-- snout + nose -->
  <ellipse cx="280" cy="300" rx="52" ry="40" fill="#FFF6EC" stroke="#D9B98E" stroke-width="3"/>
  <ellipse cx="280" cy="288" rx="20" ry="15" fill="#3D3A37"/>
  <!-- smiling mouth -->
  <path d="M280 304 q0 24 -28 30 M280 304 q0 24 28 30" fill="none" stroke="#3D3A37" stroke-width="4" stroke-linecap="round"/>
  <path d="M268 338 q12 12 24 0" fill="#F6B8C0" stroke="#3D3A37" stroke-width="3" stroke-linecap="round"/>

  <!-- body -->
  <path d="M150 380 q0 -30 40 -34 q90 -10 180 0 q40 4 40 34 l0 120 q0 40 -50 40 l-210 0 q-50 0 -50 -40 z" fill="#F3D9B8" stroke="#D9B98E" stroke-width="4"/>

  <!-- paws holding an envelope -->
  <ellipse cx="186" cy="528" rx="40" ry="30" fill="#F3D9B8" stroke="#D9B98E" stroke-width="4"/>
  <ellipse cx="374" cy="528" rx="40" ry="30" fill="#F3D9B8" stroke="#D9B98E" stroke-width="4"/>

  <!-- envelope (the "mail") -->
  <rect x="196" y="430" width="168" height="116" rx="14" fill="#FFFFFF" stroke="#C8623F" stroke-width="5"/>
  <path d="M196 444 L280 506 L364 444" fill="none" stroke="#C8623F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- little paw-stamp on the envelope -->
  <g transform="translate(330 462)">
    <circle cx="0" cy="6" r="11" fill="#F6B8C0"/>
    <circle cx="-9" cy="-7" r="4" fill="#F6B8C0"/>
    <circle cx="0" cy="-11" r="4" fill="#F6B8C0"/>
    <circle cx="9" cy="-7" r="4" fill="#F6B8C0"/>
  </g>

  <!-- collar tag -->
  <rect x="252" y="384" width="56" height="22" rx="11" fill="#CFE4F2" stroke="#2E5C7E" stroke-width="3"/>
  <text x="280" y="400" font-family="Comic Sans MS, sans-serif" font-size="14" font-weight="bold" fill="#2E5C7E" text-anchor="middle">PIP</text>
</svg>
