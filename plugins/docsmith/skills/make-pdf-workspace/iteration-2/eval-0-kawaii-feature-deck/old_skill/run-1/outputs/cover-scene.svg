<svg xmlns="http://www.w3.org/2000/svg" width="900" height="460" viewBox="0 0 900 460">
  <!-- Pawmail storybook cover scene — hand-written kawaii SVG -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DDEAF6"/>
      <stop offset="1" stop-color="#F8E0E4"/>
    </linearGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DCEFE0"/>
      <stop offset="1" stop-color="#CFE8DE"/>
    </linearGradient>
  </defs>

  <!-- sky panel -->
  <rect x="0" y="0" width="900" height="460" rx="40" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="760" cy="110" r="56" fill="#FBEF9E"/>
  <g stroke="#F3D98A" stroke-width="6" stroke-linecap="round">
    <line x1="760" y1="22" x2="760" y2="2"/>
    <line x1="846" y1="110" x2="866" y2="110"/>
    <line x1="824" y1="46" x2="838" y2="32"/>
    <line x1="824" y1="174" x2="838" y2="188"/>
  </g>

  <!-- fluffy clouds -->
  <g fill="#FFFFFF" opacity="0.92">
    <ellipse cx="150" cy="90" rx="60" ry="34"/>
    <ellipse cx="200" cy="100" rx="46" ry="28"/>
    <ellipse cx="110" cy="104" rx="42" ry="26"/>
    <ellipse cx="500" cy="62" rx="50" ry="28"/>
    <ellipse cx="548" cy="72" rx="38" ry="22"/>
  </g>

  <!-- rolling hills -->
  <path d="M0 320 q225 -90 450 0 q225 90 450 0 L900 460 L0 460 Z" fill="url(#hillA)"/>
  <path d="M0 380 q300 -60 600 10 q150 18 300 -10 L900 460 L0 460 Z" fill="#CFE8DE"/>

  <!-- little path -->
  <path d="M430 460 q20 -90 50 -130" fill="none" stroke="#F3D9B8" stroke-width="26" stroke-linecap="round"/>

  <!-- mailbox -->
  <g transform="translate(430 250)">
    <rect x="-8" y="0" width="14" height="120" rx="4" fill="#A87A4E"/>
    <rect x="-44" y="-46" width="92" height="58" rx="20" fill="#C8623F" stroke="#9E4C2E" stroke-width="4"/>
    <rect x="-44" y="-18" width="92" height="30" rx="8" fill="#F6B8C0" opacity="0.5"/>
    <!-- flag up -->
    <rect x="44" y="-44" width="8" height="34" rx="3" fill="#1A7A3A"/>
    <path d="M52 -44 l24 8 l-24 8 z" fill="#7FCB86"/>
    <!-- little envelope peeking out -->
    <rect x="6" y="-40" width="34" height="24" rx="4" fill="#FFFFFF" stroke="#7A746C" stroke-width="2"/>
    <path d="M6 -38 L23 -26 L40 -38" fill="none" stroke="#7A746C" stroke-width="2"/>
  </g>

  <!-- flying letter with wings -->
  <g transform="translate(250 180)">
    <rect x="0" y="0" width="64" height="44" rx="8" fill="#FFFFFF" stroke="#C8623F" stroke-width="4"/>
    <path d="M0 4 L32 28 L64 4" fill="none" stroke="#C8623F" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 6 q-40 -22 -52 6 q34 -4 52 14 z" fill="#CFE4F2" stroke="#2E5C7E" stroke-width="3"/>
    <path d="M64 6 q40 -22 52 6 q-34 -4 -52 14 z" fill="#CFE4F2" stroke="#2E5C7E" stroke-width="3"/>
  </g>

  <!-- tiny tulips -->
  <g transform="translate(120 400)">
    <line x1="0" y1="0" x2="0" y2="-34" stroke="#1A7A3A" stroke-width="5"/>
    <path d="M-12 -34 q12 -18 24 0 q-12 8 -24 0 z" fill="#E8604A"/>
  </g>
  <g transform="translate(720 410)">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#1A7A3A" stroke-width="5"/>
    <path d="M-11 -30 q11 -16 22 0 q-11 7 -22 0 z" fill="#F6B8C0"/>
  </g>
</svg>
