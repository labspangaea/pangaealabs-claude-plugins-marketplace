<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="480" viewBox="0 0 440 480">
  <!-- Pawmail mascot: Biscuit the postal pup, holding a love-letter envelope -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FBE8DA"/>
      <stop offset="100%" stop-color="#FBE8DA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft halo behind mascot -->
  <ellipse cx="220" cy="210" rx="200" ry="200" fill="url(#halo)"/>

  <!-- tail -->
  <path d="M120 330 q-46 -22 -34 -64 q22 14 44 30 z" fill="#E8C9A6" stroke="#C9A678" stroke-width="4" stroke-linejoin="round"/>

  <!-- body -->
  <ellipse cx="220" cy="360" rx="118" ry="96" fill="#F4DCBE" stroke="#C9A678" stroke-width="5"/>
  <!-- belly patch -->
  <ellipse cx="220" cy="378" rx="74" ry="64" fill="#FBF1E0" stroke="#E5CFB0" stroke-width="3"/>

  <!-- left paw -->
  <ellipse cx="150" cy="430" rx="34" ry="26" fill="#F4DCBE" stroke="#C9A678" stroke-width="5"/>
  <!-- right paw -->
  <ellipse cx="290" cy="430" rx="34" ry="26" fill="#F4DCBE" stroke="#C9A678" stroke-width="5"/>

  <!-- envelope held in paws -->
  <g transform="translate(220 388) rotate(-4)">
    <rect x="-78" y="-44" width="156" height="100" rx="12" fill="#FFFFFF" stroke="#E2DBC9" stroke-width="4"/>
    <path d="M-78 -36 L0 18 L78 -36" fill="none" stroke="#C8623F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- little heart wax seal -->
    <path d="M0 6 q-12 -16 -24 -4 q-10 10 24 30 q34 -20 24 -30 q-12 -12 -24 4 z" fill="#E8604A"/>
  </g>

  <!-- head -->
  <ellipse cx="220" cy="190" rx="128" ry="116" fill="#F4DCBE" stroke="#C9A678" stroke-width="5"/>

  <!-- left ear -->
  <path d="M118 120 q-58 -8 -70 70 q-8 64 56 70 q24 -78 36 -120 z" fill="#D9B88C" stroke="#C9A678" stroke-width="5" stroke-linejoin="round"/>
  <!-- right ear -->
  <path d="M322 120 q58 -8 70 70 q8 64 -56 70 q-24 -78 -36 -120 z" fill="#D9B88C" stroke="#C9A678" stroke-width="5" stroke-linejoin="round"/>

  <!-- cheek blushes -->
  <ellipse cx="138" cy="216" rx="24" ry="15" fill="#F6C9C0" opacity="0.85"/>
  <ellipse cx="302" cy="216" rx="24" ry="15" fill="#F6C9C0" opacity="0.85"/>

  <!-- eyes -->
  <circle cx="176" cy="176" r="18" fill="#3D3A37"/>
  <circle cx="182" cy="170" r="6" fill="#FFFFFF"/>
  <circle cx="264" cy="176" r="18" fill="#3D3A37"/>
  <circle cx="270" cy="170" r="6" fill="#FFFFFF"/>

  <!-- muzzle -->
  <ellipse cx="220" cy="232" rx="58" ry="46" fill="#FBF1E0" stroke="#E5CFB0" stroke-width="3"/>
  <!-- nose -->
  <ellipse cx="220" cy="216" rx="20" ry="15" fill="#5A3A2A"/>
  <ellipse cx="214" cy="211" rx="6" ry="4" fill="#8A6A50"/>
  <!-- smile -->
  <path d="M220 230 L220 248 M220 248 q-22 18 -42 4 M220 248 q22 18 42 4" fill="none" stroke="#5A3A2A" stroke-width="4" stroke-linecap="round"/>
  <!-- little tongue -->
  <path d="M210 256 q10 16 20 0 q0 14 -10 16 q-10 -2 -10 -16 z" fill="#E8604A"/>
</svg>
