  <g stroke="#0A0A0A" stroke-width="6" stroke-dasharray="2 11" stroke-linecap="round" fill="none">
    <path d="M528 305 H772" marker-end="url(#ar)"/><path d="M888 305 H1132" marker-end="url(#ar)"/><path d="M1248 305 H1492" marker-end="url(#ar)"/>
  </g>
