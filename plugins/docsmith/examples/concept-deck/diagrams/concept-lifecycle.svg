  <g transform="translate(428,566) scale(0.7)" stroke="#0A0A0A" stroke-width="6"><circle cx="48" cy="44" r="22" fill="#fff"/><path d="M20 100 C20 70 76 70 76 100 Z" fill="#fff"/><rect x="74" y="20" width="40" height="30" rx="8" fill="#fff"/><text x="94" y="43" font-size="22" font-weight="900" fill="#0A0A0A" text-anchor="middle" stroke="none">?</text></g>
