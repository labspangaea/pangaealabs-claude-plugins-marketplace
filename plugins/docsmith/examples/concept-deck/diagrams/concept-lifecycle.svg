  <g transform="translate(1508,266) scale(0.7)" fill="#fff" stroke="#0A0A0A" stroke-width="6"><path d="M28 32 V88 a32 14 0 0 0 64 0 V32 Z"/><ellipse cx="60" cy="32" rx="32" ry="14"/><path d="M28 56 a32 14 0 0 0 64 0" fill="none"/><ellipse cx="60" cy="32" rx="32" ry="14" fill="none" stroke="#3FA9F5" stroke-width="4"/></g>
