  <g transform="translate(788,266) scale(0.7)" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round"><path d="M34 16 H78 L96 36 V104 H34 Z" fill="#fff"/><path d="M78 16 V36 H96" fill="none"/><g stroke="#3FA9F5" stroke-width="5" stroke-linecap="round"><line x1="46" y1="56" x2="84" y2="56"/><line x1="46" y1="70" x2="84" y2="70"/><line x1="46" y1="84" x2="72" y2="84"/></g></g>
