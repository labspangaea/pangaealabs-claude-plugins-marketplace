  <rect x="60" y="480" width="1800" height="260" rx="22" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="60" y="480" width="230" height="260" rx="22" fill="#FFDEB6" stroke="#0A0A0A" stroke-width="4"/>
  <text x="175" y="625" text-anchor="middle" font-size="40" font-weight="800" fill="#0A0A0A">Serve</text>
  <text x="175" y="665" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" fill="#8a5a1e">online</text>
  <g stroke="#0A0A0A" stroke-width="6" stroke-dasharray="2 11" stroke-linecap="round" fill="none">
    <path d="M528 605 H772" marker-end="url(#ar)"/><path d="M888 605 H1132" marker-end="url(#ar)"/><path d="M1248 605 H1492" marker-end="url(#ar)"/>
