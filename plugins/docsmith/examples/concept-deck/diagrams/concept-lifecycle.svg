    <g fill="#04121f" stroke="none" font-size="24" text-anchor="middle"><text x="600" y="841">9</text><text x="1080" y="841">10</text><text x="1560" y="841">11</text></g></g>
  <g transform="translate(558,866) scale(0.7)" stroke="#0A0A0A" stroke-width="6"><rect x="20" y="34" width="80" height="16" rx="8" fill="#fff"/><rect x="20" y="58" width="80" height="16" rx="8" fill="#fff"/><rect x="20" y="82" width="80" height="16" rx="8" fill="#fff"/><g fill="#3FA9F5" stroke="none"><circle cx="33" cy="42" r="3.5"/><circle cx="33" cy="66" r="3.5"/><circle cx="33" cy="90" r="3.5"/></g></g>
  <g transform="translate(1038,866) scale(0.7)" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"><circle cx="60" cy="60" r="40" fill="#fff"/><path d="M42 62 L56 76 L82 46" fill="none"/></g>
  <g transform="translate(1518,866) scale(0.7)" stroke="#0A0A0A" stroke-width="5" stroke-linejoin="round"><g fill="#fff"><rect x="52" y="12" width="16" height="22" rx="3"/><rect x="52" y="86" width="16" height="22" rx="3"/><rect x="12" y="52" width="22" height="16" rx="3"/><rect x="86" y="52" width="22" height="16" rx="3"/><rect x="22" y="22" width="18" height="18" rx="3" transform="rotate(45 31 31)"/><rect x="80" y="22" width="18" height="18" rx="3" transform="rotate(45 89 31)"/><rect x="22" y="80" width="18" height="18" rx="3" transform="rotate(45 31 89)"/><rect x="80" y="80" width="18" height="18" rx="3" transform="rotate(45 89 89)"/></g><circle cx="60" cy="60" r="30" fill="#fff"/><circle cx="60" cy="60" r="13" fill="#3FA9F5"/></g>
