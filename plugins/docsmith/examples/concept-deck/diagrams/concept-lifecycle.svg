  <!-- feedback loop: tune → re-embed (lane3 → lane1) -->
  <path d="M1560 788 C1560 470 1840 470 1840 250 C1840 150 1300 150 1190 196" fill="none" stroke="#3FA9F5" stroke-width="5" stroke-dasharray="2 11" stroke-linecap="round" marker-end="url(#ar)"/>
  <text x="1700" y="360" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#1F6FB8">feedback → re-tune</text>
</svg>
