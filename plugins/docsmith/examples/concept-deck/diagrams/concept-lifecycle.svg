<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Poppins, sans-serif">
  <defs>
    <marker id="ar" markerWidth="22" markerHeight="22" refX="15" refY="11" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L20,11 L2,20 Z" fill="#0A0A0A"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#F4F6FD"/>
  <text x="960" y="105" text-anchor="middle" font-size="100" font-weight="900" fill="#0A0A0A">The RAG lifecycle</text>

  <!-- step badge + connector helpers are inlined per lane -->
  <!-- ===================== LANE 1 · INGEST (offline) ===================== -->
  <rect x="60" y="180" width="1800" height="260" rx="22" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="60" y="180" width="230" height="260" rx="22" fill="#A9F5D9" stroke="#0A0A0A" stroke-width="4"/>
  <text x="175" y="325" text-anchor="middle" font-size="40" font-weight="800" fill="#0A0A0A">Ingest</text>
  <text x="175" y="365" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" fill="#15604a">offline</text>
