  <g transform="translate(1148,566) scale(0.7)" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round"><path d="M34 16 H78 L96 36 V104 H34 Z" fill="#fff"/><path d="M78 16 V36 H96" fill="none"/><g stroke="#3FA9F5" stroke-width="5" stroke-linecap="round"><line x1="46" y1="56" x2="84" y2="56"/><line x1="46" y1="70" x2="84" y2="70"/></g></g>
  <g transform="translate(1508,566) scale(0.7)"><g transform="translate(-196,-148) scale(0.77)"><path d="M270 286 C258 252 286 218 318 226 C330 204 360 204 372 226 C406 220 430 252 414 284 C428 306 406 332 374 326 C362 344 320 344 310 326 C280 330 256 308 270 286 Z" fill="#fff" stroke="#0A0A0A" stroke-width="6"/><path d="M342 224 C350 252 334 270 344 294 C352 312 340 322 342 330" fill="none" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round"/><g fill="#3FA9F5"><circle cx="300" cy="252" r="7"/><circle cx="332" cy="238" r="7"/><circle cx="362" cy="252" r="7"/><circle cx="316" cy="296" r="7"/><circle cx="356" cy="296" r="7"/></g></g></g>
  <g font-family="JetBrains Mono, monospace" font-size="26" fill="#0A0A0A" text-anchor="middle"><text x="470" y="708">query</text><text x="830" y="708">retrieve</text><text x="1190" y="708">augment</text><text x="1550" y="708">generate</text></g>

  <!-- index feeds retrieval: lane1 store → lane2 retrieve -->
  <path d="M1550 358 C1550 420 830 420 830 478" fill="none" stroke="#0A0A0A" stroke-width="5" stroke-dasharray="2 11" stroke-linecap="round" marker-end="url(#ar)"/>
  <text x="1180" y="455" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">index serves queries</text>

  <!-- ===================== LANE 3 · EVALUATE ===================== -->
  <rect x="60" y="780" width="1800" height="260" rx="22" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="60" y="780" width="230" height="260" rx="22" fill="#D8C8F5" stroke="#0A0A0A" stroke-width="4"/>
  <text x="175" y="925" text-anchor="middle" font-size="38" font-weight="800" fill="#0A0A0A">Evaluate</text>
  <g stroke="#0A0A0A" stroke-width="6" stroke-dasharray="2 11" stroke-linecap="round" fill="none">
    <path d="M658 905 H1012" marker-end="url(#ar)"/><path d="M1138 905 H1492" marker-end="url(#ar)"/>
