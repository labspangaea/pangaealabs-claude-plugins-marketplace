<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Poppins, sans-serif">
  <defs>
    <marker id="ar" markerWidth="24" markerHeight="24" refX="16" refY="12" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L22,12 L2,22 Z" fill="#0A0A0A"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#F4F6FD"/>
  <text x="960" y="120" text-anchor="middle" font-size="104" font-weight="900" fill="#0A0A0A">RAG, end to end</text>

  <!-- ===================== PANEL 1 · CHUNK ===================== -->
  <g transform="translate(80,200)">
    <rect x="0" y="0" width="840" height="400" rx="24" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <rect x="270" y="-22" width="300" height="44" fill="#F4F6FD"/>
    <text x="420" y="8" text-anchor="middle" font-size="40" font-weight="900" fill="#0A0A0A">1 · Chunk</text>
    <!-- doc -->
    <g transform="translate(60,130) scale(1.4)" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round">
      <path d="M34 16 H78 L96 36 V104 H34 Z" fill="#fff"/><path d="M78 16 V36 H96" fill="none"/>
      <g stroke="#3FA9F5" stroke-width="5" stroke-linecap="round"><line x1="46" y1="56" x2="84" y2="56"/><line x1="46" y1="70" x2="84" y2="70"/><line x1="46" y1="84" x2="72" y2="84"/></g>
    </g>
    <text x="140" y="332" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" fill="#2A3550">1 doc</text>
    <path d="M252 215 H338" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <!-- chunk bars -->
    <g>
      <rect x="370" y="70"  width="420" height="56" rx="12" fill="#BCD8FF" stroke="#0A0A0A" stroke-width="3"/>
      <rect x="370" y="138" width="420" height="56" rx="12" fill="#A9F5D9" stroke="#0A0A0A" stroke-width="3"/>
      <rect x="370" y="206" width="420" height="56" rx="12" fill="#FFDEB6" stroke="#0A0A0A" stroke-width="3"/>
      <rect x="370" y="274" width="420" height="56" rx="12" fill="#F5A9C2" stroke="#0A0A0A" stroke-width="3"/>
      <g stroke-linecap="round" stroke-width="7">
        <line x1="392" y1="92"  x2="640" y2="92"  stroke="#8FB7F0"/><line x1="392" y1="108" x2="560" y2="108" stroke="#8FB7F0"/>
        <line x1="392" y1="160" x2="640" y2="160" stroke="#6FD9B0"/><line x1="392" y1="176" x2="560" y2="176" stroke="#6FD9B0"/>
        <line x1="392" y1="228" x2="640" y2="228" stroke="#E0975F"/><line x1="392" y1="244" x2="560" y2="244" stroke="#E0975F"/>
        <line x1="392" y1="296" x2="640" y2="296" stroke="#EA799E"/><line x1="392" y1="312" x2="560" y2="312" stroke="#EA799E"/>
      </g>
    </g>
    <text x="580" y="368" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" fill="#2A3550">→ many chunks</text>
  </g>

  <!-- ===================== PANEL 2 · EMBED ===================== -->
  <g transform="translate(1000,200)">
    <rect x="0" y="0" width="840" height="400" rx="24" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <rect x="270" y="-22" width="300" height="44" fill="#F4F6FD"/>
    <text x="420" y="8" text-anchor="middle" font-size="40" font-weight="900" fill="#0A0A0A">2 · Embed</text>
    <!-- chunk -->
    <rect x="40" y="150" width="200" height="80" rx="12" fill="#A9F5D9" stroke="#0A0A0A" stroke-width="3"/>
    <g stroke="#6FD9B0" stroke-width="7" stroke-linecap="round"><line x1="64" y1="178" x2="216" y2="178"/><line x1="64" y1="200" x2="170" y2="200"/></g>
    <text x="140" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">chunk</text>
    <path d="M252 190 H330" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <!-- vector -->
    <text x="356" y="208" font-family="JetBrains Mono, monospace" font-size="70" fill="#0A0A0A">[</text>
    <g fill="#3FA9F5"><circle cx="410" cy="185" r="10"/><circle cx="448" cy="185" r="10"/><circle cx="486" cy="185" r="10"/><circle cx="524" cy="185" r="10"/></g>
    <text x="540" y="208" font-family="JetBrains Mono, monospace" font-size="70" fill="#0A0A0A">]</text>
    <text x="455" y="270" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">vector</text>
    <path d="M600 190 H670" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <!-- vector space -->
    <rect x="690" y="90" width="120" height="200" rx="12" fill="#EDF1FA" stroke="#0A0A0A" stroke-width="3"/>
    <g fill="#3FA9F5"><circle cx="722" cy="130" r="8"/><circle cx="778" cy="150" r="8"/><circle cx="740" cy="190" r="8"/><circle cx="790" cy="225" r="8"/><circle cx="716" cy="245" r="8"/><circle cx="762" cy="265" r="8"/></g>
    <text x="750" y="320" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">space</text>
    <text x="420" y="368" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" fill="#2A3550">text → numbers</text>
  </g>

  <!-- ===================== PANEL 3 · RETRIEVE ===================== -->
  <g transform="translate(80,650)">
    <rect x="0" y="0" width="840" height="400" rx="24" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <rect x="195" y="-22" width="450" height="44" fill="#F4F6FD"/>
    <text x="420" y="8" text-anchor="middle" font-size="40" font-weight="900" fill="#0A0A0A">3 · Retrieve top-K</text>
    <!-- 2D space -->
    <rect x="50" y="60" width="500" height="300" rx="16" fill="#EDF1FA" stroke="#0A0A0A" stroke-width="3"/>
    <!-- corpus points (grey) -->
    <g fill="#A8B4CC"><circle cx="120" cy="120" r="9"/><circle cx="220" cy="100" r="9"/><circle cx="470" cy="120" r="9"/><circle cx="430" cy="300" r="9"/><circle cx="140" cy="300" r="9"/><circle cx="500" cy="220" r="9"/><circle cx="110" cy="220" r="9"/></g>
    <!-- query -->
    <g transform="translate(300,210)"><path d="M0 -20 L18 0 L0 20 L-18 0 Z" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="3"/></g>
    <!-- top-3 nearest: lines + rings -->
    <g stroke="#3FA9F5" stroke-width="3" stroke-dasharray="6 7"><line x1="300" y1="210" x2="240" y2="160"/><line x1="300" y1="210" x2="360" y2="150"/><line x1="300" y1="210" x2="340" y2="280"/></g>
    <g fill="#3FA9F5" stroke="#0A0A0A" stroke-width="3"><circle cx="240" cy="160" r="11"/><circle cx="360" cy="150" r="11"/><circle cx="340" cy="280" r="11"/></g>
    <!-- legend -->
    <g transform="translate(600,120)">
      <path d="M0 0 L16 16 L0 32 L-16 16 Z" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="3" transform="translate(16,-2) scale(0.9)"/>
      <text x="44" y="24" font-family="JetBrains Mono, monospace" font-size="26" fill="#0A0A0A">query</text>
      <circle cx="16" cy="84" r="13" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="3"/>
      <text x="44" y="94" font-family="JetBrains Mono, monospace" font-size="26" fill="#0A0A0A">top-3 hits</text>
      <circle cx="16" cy="144" r="11" fill="#A8B4CC"/>
      <text x="44" y="154" font-family="JetBrains Mono, monospace" font-size="26" fill="#0A0A0A">corpus</text>
    </g>
    <text x="300" y="392" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">nearest neighbours to the query vector</text>
  </g>

  <!-- ===================== PANEL 4 · GENERATE ===================== -->
  <g transform="translate(1000,650)">
    <rect x="0" y="0" width="840" height="400" rx="24" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="4"/>
    <rect x="135" y="-22" width="570" height="44" fill="#F4F6FD"/>
    <text x="420" y="8" text-anchor="middle" font-size="40" font-weight="900" fill="#0A0A0A">4 · Augment &amp; generate</text>
    <!-- inputs -->
    <rect x="40" y="90"  width="220" height="80" rx="12" fill="#BCD8FF" stroke="#0A0A0A" stroke-width="3"/>
    <text x="150" y="140" text-anchor="middle" font-size="30" font-weight="800" fill="#0A0A0A">question</text>
    <rect x="40" y="230" width="220" height="80" rx="12" fill="#FFDEB6" stroke="#0A0A0A" stroke-width="3"/>
    <text x="150" y="280" text-anchor="middle" font-size="30" font-weight="800" fill="#0A0A0A">top-K chunks</text>
    <!-- merge arrows to brain -->
    <path d="M260 130 C330 130 330 200 392 200" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <path d="M260 270 C330 270 330 200 392 200" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <!-- brain -->
    <g transform="translate(410,140) scale(1.0)"><g transform="translate(-196,-148) scale(0.77)">
      <path d="M270 286 C258 252 286 218 318 226 C330 204 360 204 372 226 C406 220 430 252 414 284 C428 306 406 332 374 326 C362 344 320 344 310 326 C280 330 256 308 270 286 Z" fill="#fff" stroke="#0A0A0A" stroke-width="6"/>
      <path d="M342 224 C350 252 334 270 344 294 C352 312 340 322 342 330" fill="none" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round"/>
      <g fill="#3FA9F5"><circle cx="300" cy="252" r="7"/><circle cx="332" cy="238" r="7"/><circle cx="362" cy="252" r="7"/><circle cx="316" cy="296" r="7"/><circle cx="356" cy="296" r="7"/></g>
    </g></g>
    <text x="470" y="320" text-anchor="middle" font-size="30" font-weight="800" fill="#0A0A0A">LLM</text>
    <!-- arrow to answer -->
    <path d="M560 200 H648" fill="none" stroke="#0A0A0A" stroke-width="8" marker-end="url(#ar)"/>
    <rect x="660" y="150" width="150" height="100" rx="12" fill="#D8C8F5" stroke="#0A0A0A" stroke-width="3"/>
    <text x="735" y="208" text-anchor="middle" font-size="30" font-weight="800" fill="#0A0A0A">answer</text>
    <text x="420" y="372" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">grounded, cited, fresh</text>
  </g>
</svg>
