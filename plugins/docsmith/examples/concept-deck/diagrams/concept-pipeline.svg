<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Poppins, sans-serif">
  <defs>
    <marker id="ar" markerWidth="26" markerHeight="26" refX="17" refY="13" orient="auto" markerUnits="userSpaceOnUse"><path d="M2,2 L24,13 L2,24 Z" fill="#0A0A0A"/></marker>
  </defs>
  <rect width="1920" height="1080" fill="#F4F6FD"/>
  <text x="960" y="150" text-anchor="middle" font-size="118" font-weight="900" fill="#0A0A0A">The RAG pipeline</text>

  <!-- 4 stage cards -->
  <rect x="120"  y="430" width="330" height="280" rx="28" fill="#BCD8FF" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="558"  y="430" width="330" height="280" rx="28" fill="#A9F5D9" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="996"  y="430" width="330" height="280" rx="28" fill="#FFDEB6" stroke="#0A0A0A" stroke-width="4"/>
  <rect x="1434" y="430" width="330" height="280" rx="28" fill="#F5A9C2" stroke="#0A0A0A" stroke-width="4"/>

  <!-- connectors -->
  <path d="M450 570 H554"   fill="none" stroke="#0A0A0A" stroke-width="10" marker-end="url(#ar)"/>
  <path d="M888 570 H992"   fill="none" stroke="#0A0A0A" stroke-width="10" marker-end="url(#ar)"/>
  <path d="M1326 570 H1430" fill="none" stroke="#0A0A0A" stroke-width="10" marker-end="url(#ar)"/>

  <!-- number badges -->
  <g font-family="JetBrains Mono, monospace" font-weight="700">
    <circle cx="160" cy="430" r="30" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="4"/><text x="160" y="441" text-anchor="middle" font-size="30" fill="#04121f">1</text>
    <circle cx="598" cy="430" r="30" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="4"/><text x="598" y="441" text-anchor="middle" font-size="30" fill="#04121f">2</text>
    <circle cx="1036" cy="430" r="30" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="4"/><text x="1036" y="441" text-anchor="middle" font-size="30" fill="#04121f">3</text>
    <circle cx="1474" cy="430" r="30" fill="#3FA9F5" stroke="#0A0A0A" stroke-width="4"/><text x="1474" y="441" text-anchor="middle" font-size="30" fill="#04121f">4</text>
  </g>

  <!-- icons -->
  <g transform="translate(230,470) scale(0.92)" stroke="#0A0A0A" stroke-width="6">
    <circle cx="48" cy="44" r="22" fill="#fff"/><path d="M20 100 C20 70 76 70 76 100 Z" fill="#fff"/>
    <rect x="74" y="20" width="40" height="30" rx="8" fill="#fff"/><text x="94" y="43" font-size="22" font-weight="900" fill="#0A0A0A" text-anchor="middle" stroke="none">?</text>
  </g>
  <g transform="translate(668,472) scale(0.9)" fill="none" stroke="#0A0A0A" stroke-width="7" stroke-linecap="round">
    <circle cx="52" cy="50" r="30" fill="#E8FBF2"/><line x1="74" y1="72" x2="100" y2="98" stroke-width="14"/>
    <line x1="40" y1="44" x2="66" y2="44" stroke="#3FA9F5" stroke-width="6"/><line x1="40" y1="56" x2="60" y2="56" stroke="#3FA9F5" stroke-width="6"/>
  </g>
  <g transform="translate(1106,468) scale(0.92)" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="round">
    <path d="M34 16 H78 L96 36 V104 H34 Z" fill="#fff"/><path d="M78 16 V36 H96" fill="none"/>
    <g stroke="#3FA9F5" stroke-width="5" stroke-linecap="round"><line x1="46" y1="56" x2="84" y2="56"/><line x1="46" y1="70" x2="84" y2="70"/><line x1="46" y1="84" x2="72" y2="84"/></g>
  </g>
  <g transform="translate(1545,452) scale(0.78)"><g transform="translate(-196,-148) scale(0.77)">
    <path d="M270 286 C258 252 286 218 318 226 C330 204 360 204 372 226 C406 220 430 252 414 284 C428 306 406 332 374 326 C362 344 320 344 310 326 C280 330 256 308 270 286 Z" fill="#fff" stroke="#0A0A0A" stroke-width="6"/>
    <path d="M342 224 C350 252 334 270 344 294 C352 312 340 322 342 330" fill="none" stroke="#0A0A0A" stroke-width="4" stroke-linecap="round"/>
    <g fill="#3FA9F5"><circle cx="300" cy="252" r="7"/><circle cx="332" cy="238" r="7"/><circle cx="362" cy="252" r="7"/><circle cx="316" cy="296" r="7"/><circle cx="356" cy="296" r="7"/></g>
  </g></g>

  <!-- titles + subs -->
  <g text-anchor="middle">
    <text x="285"  y="638" font-size="42" font-weight="800" fill="#0A0A0A">Ask</text>
    <text x="723"  y="638" font-size="42" font-weight="800" fill="#0A0A0A">Search</text>
    <text x="1161" y="638" font-size="42" font-weight="800" fill="#0A0A0A">Augment</text>
    <text x="1599" y="638" font-size="42" font-weight="800" fill="#0A0A0A">Generate</text>
  </g>
  <g text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#2A3550">
    <text x="285"  y="678">user query in</text>
    <text x="723"  y="678">hit the index</text>
    <text x="1161" y="678">chunks + prompt</text>
    <text x="1599" y="678">grounded answer</text>
  </g>

  <text x="960" y="830" text-anchor="middle" font-size="34" font-weight="700" fill="#0A0A0A">Fetch first — <tspan fill="#1F6FB8">then</tspan> generate.</text>
</svg>
