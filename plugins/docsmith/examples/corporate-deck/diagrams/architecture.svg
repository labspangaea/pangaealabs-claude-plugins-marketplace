  <rect x="64" y="472" width="200" height="38" rx="8" fill="#ffffff" stroke="#a48751" stroke-width="2"/>
  <text x="164" y="497" text-anchor="middle" font-size="15" fill="#071e49">Operational DB</text>
  <rect x="296" y="472" width="200" height="38" rx="8" fill="#ffffff" stroke="#a48751" stroke-width="2"/>
  <text x="396" y="497" text-anchor="middle" font-size="15" fill="#071e49">Lakehouse</text>

  <line x1="280" y1="524" x2="280" y2="560" stroke="#071e49" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Layer 5: Observability -->
  <rect x="40" y="564" width="480" height="48" rx="16" fill="#071e49" stroke="#071e49" stroke-width="2.5"/>
  <text x="280" y="594" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">Observability &amp; Security Mesh</text>
