  <line x1="280" y1="116" x2="280" y2="152" stroke="#071e49" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Layer 2: Edge / Gateway -->
  <rect x="40" y="156" width="480" height="72" rx="16" fill="#b5e0ea" stroke="#071e49" stroke-width="2.5"/>
  <text x="280" y="190" text-anchor="middle" font-size="22" font-weight="bold" fill="#071e49">Edge Gateway</text>
  <text x="280" y="214" text-anchor="middle" font-size="15" fill="#244b57">auth · rate-limit · routing</text>

  <line x1="280" y1="228" x2="280" y2="264" stroke="#071e49" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Layer 3: Services -->
  <rect x="40" y="268" width="480" height="120" rx="16" fill="#92d05d" stroke="#071e49" stroke-width="2.5"/>
  <text x="280" y="298" text-anchor="middle" font-size="22" font-weight="bold" fill="#071e49">Core Services</text>
  <rect x="64" y="316" width="138" height="54" rx="10" fill="#ffffff" stroke="#5a9438" stroke-width="2"/>
  <text x="133" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#071e49">Billing</text>
  <text x="133" y="359" text-anchor="middle" font-size="13" fill="#5a6b7d">invoices</text>
  <rect x="211" y="316" width="138" height="54" rx="10" fill="#ffffff" stroke="#5a9438" stroke-width="2"/>
  <text x="280" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#071e49">Identity</text>
  <text x="280" y="359" text-anchor="middle" font-size="13" fill="#5a6b7d">accounts</text>
  <rect x="358" y="316" width="138" height="54" rx="10" fill="#ffffff" stroke="#5a9438" stroke-width="2"/>
  <text x="427" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="#071e49">Analytics</text>
  <text x="427" y="359" text-anchor="middle" font-size="13" fill="#5a6b7d">events</text>

  <line x1="280" y1="388" x2="280" y2="424" stroke="#071e49" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Layer 4: Data platform -->
  <rect x="40" y="428" width="480" height="96" rx="16" fill="#d1b06c" stroke="#071e49" stroke-width="2.5"/>
