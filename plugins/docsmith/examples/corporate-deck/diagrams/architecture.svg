<svg xmlns="http://www.w3.org/2000/svg" width="560" height="620" viewBox="0 0 560 620" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 z" fill="#071e49"/>
    </marker>
  </defs>

  <!-- Layer 1: Channels -->
  <rect x="40" y="20" width="480" height="96" rx="16" fill="#faf8f3" stroke="#071e49" stroke-width="2.5"/>
  <text x="280" y="50" text-anchor="middle" font-size="22" font-weight="bold" fill="#071e49">Customer Channels</text>
  <rect x="64" y="64" width="130" height="38" rx="8" fill="#ffffff" stroke="#d1b06c" stroke-width="2"/>
  <text x="129" y="89" text-anchor="middle" font-size="16" fill="#071e49">Web App</text>
  <rect x="215" y="64" width="130" height="38" rx="8" fill="#ffffff" stroke="#d1b06c" stroke-width="2"/>
  <text x="280" y="89" text-anchor="middle" font-size="16" fill="#071e49">Mobile</text>
  <rect x="366" y="64" width="130" height="38" rx="8" fill="#ffffff" stroke="#d1b06c" stroke-width="2"/>
