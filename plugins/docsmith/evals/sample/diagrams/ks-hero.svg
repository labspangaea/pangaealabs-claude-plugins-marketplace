<svg xmlns="http://www.w3.org/2000/svg" width="320" height="360" viewBox="0 0 320 360" font-family="sans-serif">
  <!-- kawaii hero: a cozy little bear, hand-written SVG (no image-gen) -->
  <defs>
    <radialGradient id="ksBody" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBE8DA"/>
      <stop offset="100%" stop-color="#E8C3A6"/>
    </radialGradient>
  </defs>

  <!-- soft shadow on the ground -->
  <ellipse cx="160" cy="338" rx="96" ry="16" fill="#000000" opacity="0.06"/>

  <!-- ears -->
  <circle cx="92"  cy="92"  r="34" fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
  <circle cx="228" cy="92"  r="34" fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
  <circle cx="92"  cy="92"  r="16" fill="#F6D9DE"/>
  <circle cx="228" cy="92"  r="16" fill="#F6D9DE"/>

  <!-- body -->
  <path d="M70 250 Q70 180 160 180 Q250 180 250 250 L250 300 Q250 336 200 336 L120 336 Q70 336 70 300 Z"
        fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
  <!-- tummy -->
  <ellipse cx="160" cy="270" rx="58" ry="56" fill="#FFF6EC"/>

  <!-- head -->
  <circle cx="160" cy="130" r="86" fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
  <!-- muzzle -->
  <ellipse cx="160" cy="158" rx="46" ry="38" fill="#FFF6EC"/>

  <!-- cheeks -->
  <circle cx="108" cy="150" r="15" fill="#F6D9DE" opacity="0.9"/>
  <circle cx="212" cy="150" r="15" fill="#F6D9DE" opacity="0.9"/>

  <!-- eyes -->
  <circle cx="132" cy="118" r="9" fill="#3D3A37"/>
  <circle cx="188" cy="118" r="9" fill="#3D3A37"/>
  <circle cx="135" cy="115" r="3" fill="#FFFFFF"/>
  <circle cx="191" cy="115" r="3" fill="#FFFFFF"/>

  <!-- nose + smile -->
  <ellipse cx="160" cy="146" rx="12" ry="9" fill="#C8623F"/>
  <path d="M160 155 Q160 170 146 172 M160 155 Q160 170 174 172"
        fill="none" stroke="#8A6D2E" stroke-width="3" stroke-linecap="round"/>

  <!-- little paws -->
  <ellipse cx="98"  cy="300" rx="22" ry="26" fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
  <ellipse cx="222" cy="300" rx="22" ry="26" fill="url(#ksBody)" stroke="#D9B393" stroke-width="3"/>
</svg>
