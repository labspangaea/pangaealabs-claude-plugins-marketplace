<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" font-family="sans-serif">
  <!-- kawaii full-bleed storybook scene: soft sky, sun, clouds, rolling hills.
       Kept pale on purpose so slide text stays legible over it. -->
  <defs>
    <linearGradient id="ksSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#DDEAF6"/>
      <stop offset="60%" stop-color="#E7E1F1"/>
      <stop offset="100%" stop-color="#F8E0E4"/>
    </linearGradient>
    <linearGradient id="ksHill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCEFE0"/>
      <stop offset="100%" stop-color="#CFE8DE"/>
    </linearGradient>
    <linearGradient id="ksHill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFE8DE"/>
      <stop offset="100%" stop-color="#BFE0D2"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#ksSky)"/>

  <!-- sun -->
  <circle cx="1560" cy="250" r="120" fill="#FBE8DA"/>
  <circle cx="1560" cy="250" r="120" fill="#F6E7B8" opacity="0.55"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="360" cy="220" rx="120" ry="46"/>
    <ellipse cx="450" cy="200" rx="90"  ry="40"/>
    <ellipse cx="280" cy="206" rx="80"  ry="36"/>
    <ellipse cx="980" cy="320" rx="110" ry="42"/>
    <ellipse cx="1070" cy="302" rx="80" ry="36"/>
  </g>

  <!-- rolling hills -->
  <path d="M0 760 Q480 640 980 740 T1920 720 L1920 1080 L0 1080 Z" fill="url(#ksHill1)"/>
  <path d="M0 880 Q560 780 1120 870 T1920 850 L1920 1080 L0 1080 Z" fill="url(#ksHill2)"/>

  <!-- tiny trees -->
  <g>
    <rect x="612" y="700" width="16" height="48" rx="6" fill="#B89B7A"/>
    <circle cx="620" cy="688" r="40" fill="#BFE0D2"/>
    <rect x="1352" y="760" width="18" height="52" rx="6" fill="#B89B7A"/>
    <circle cx="1361" cy="746" r="46" fill="#CFE8DE"/>
  </g>
</svg>
